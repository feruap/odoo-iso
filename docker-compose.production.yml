services:
  db-production:
    image: postgres:16
    container_name: odoo-production-db
    restart: always
    environment:
      - POSTGRES_DB=${POSTGRES_DB:-odoo_production}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-odoo_prod_2024_secure}
      - POSTGRES_USER=${POSTGRES_USER:-odoo}
    volumes:
      - odoo-production-db:/var/lib/postgresql/data
    networks:
      - odoo-production-net

  web-production:
    build: .
    image: odoo:19.0-amunet
    container_name: odoo-production
    restart: always
    depends_on:
      - db-production
    command: odoo -c /etc/odoo/odoo.conf --db-filter=^amunet_prod$
    ports:
      - "127.0.0.1:8069:8069"
      - "127.0.0.1:8072:8072"
    volumes:
      - odoo-production-data:/var/lib/odoo
    environment:
      - HOST=db-production
      - PORT=5432
      - USER=${POSTGRES_USER:-odoo}
      - PASSWORD=${POSTGRES_PASSWORD:-odoo_prod_2024_secure}
    networks:
      - odoo-production-net

volumes:
  odoo-production-db:
  odoo-production-data:

networks:
  odoo-production-net:
