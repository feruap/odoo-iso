name: Deploy Odoo
on:
  push:
    branches:
      - main
      - staging
jobs:
  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/staging'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Deploy to Staging via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -e
            cd /opt/odoo/staging
            export GIT_SSH_COMMAND='ssh -i /root/.ssh/id_ed25519 -o StrictHostKeyChecking=no'
            git fetch origin
            git checkout staging 2>/dev/null || git checkout -b staging origin/staging
            git reset --hard origin/staging
            docker compose -f docker-compose.staging.yml build --no-cache web-staging
            docker compose -f docker-compose.staging.yml up -d --force-recreate
            echo "Esperando que Odoo staging este listo..."
            for i in $(seq 1 24); do
              if docker exec odoo-staging curl -sf http://localhost:8069/web/health > /dev/null 2>&1; then
                echo "Odoo listo despues de $((i * 5))s"
                sleep 15
                break
              fi
              echo " Intento $i/24..."
              sleep 5
            done
            for j in 1 2 3; do
              if docker exec odoo-staging bash -c 'odoo -c /etc/odoo/odoo.conf -d amunet_prod -i amunet_production --stop-after-init --no-http --db_host $HOST --db_port $PORT --db_user $USER --db_password $PASSWORD'; then
                break
              fi
              echo "Reintentando actualizacion en 10s..."
              sleep 10
            done
            docker exec odoo-staging bash -c 'odoo -c /etc/odoo/odoo.conf -d Amunet_testing -i amunet_production --stop-after-init --no-http --db_host $HOST --db_port $PORT --db_user $USER --db_password $PASSWORD' || echo "WARNING: amunet_production update failed on Amunet_testing (possible FK issue, non-critical)"

            docker compose -f docker-compose.staging.yml restart web-staging
  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Deploy to Production via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -e
            cd /opt/odoo/production
            export GIT_SSH_COMMAND='ssh -i /root/.ssh/id_ed25519 -o StrictHostKeyChecking=no'
            git fetch origin
            git reset --hard origin/main
            docker compose -f docker-compose.production.yml build --no-cache web-production
            docker compose -f docker-compose.production.yml up -d
            echo "Esperando que Odoo produccion este listo..."
            for i in $(seq 1 24); do
              if docker exec odoo-production curl -sf http://localhost:8069/web/health > /dev/null 2>&1; then
                echo "Odoo listo despues de $((i * 5))s"
                sleep 15
                break
              fi
              echo " Intento $i/24..."
              sleep 5
            done
            for j in 1 2 3; do
              if docker exec odoo-production bash -c 'odoo -c /etc/odoo/odoo.conf --logfile /dev/stdout --workers 0 -d amunet_prod -u all --stop-after-init --no-http --db_host $HOST --db_port $PORT --db_user $USER --db_password $PASSWORD'; then
                break
              fi
              echo "Reintentando actualizacion en 10s..."
              sleep 10
            done
            docker compose -f docker-compose.production.yml restart web-production
            docker exec odoo-production bash -c 'odoo -c /etc/odoo/odoo.conf --logfile /dev/stdout --workers 0 -d Amunet_testing -u all --stop-after-init --no-http --db_host $HOST --db_port $PORT --db_user $USER --db_password $PASSWORD' || echo "WARNING: Amunet_testing upgrade failed, but production is live."

