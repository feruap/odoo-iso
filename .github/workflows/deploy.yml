name: Deploy Odoo

on:
  push:
    branches:
      - main
      - staging

jobs:
  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/staging'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to Staging via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -e
            cd /opt/odoo/staging
            export GIT_SSH_COMMAND='ssh -i /root/.ssh/id_ed25519 -o StrictHostKeyChecking=no'
            git fetch origin
            git checkout staging 2>/dev/null || git checkout -b staging origin/staging
            git reset --hard origin/staging
            docker compose -f docker-compose.staging.yml build --no-cache web-staging
            docker compose -f docker-compose.staging.yml up -d --force-recreate
            echo "Esperando que Odoo staging este listo..."
            for i in $(seq 1 24); do
              if docker exec odoo-staging curl -sf http://localhost:8069/web/health > /dev/null 2>&1; then
                echo "Odoo listo despues de $((i * 5))s"
                break
              fi
              echo "  Intento $i/24..."
              sleep 5
            done
            docker exec odoo-staging bash -c 'odoo -c /etc/odoo/odoo.conf -d amunet_prod -u all --stop-after-init --no-http --db_host $HOST --db_port $PORT --db_user $USER --db_password $PASSWORD'
            docker exec odoo-staging bash -c 'odoo -c /etc/odoo/odoo.conf -d Amunet_testing -u all --stop-after-init --no-http --db_host $HOST --db_port $PORT --db_user $USER --db_password $PASSWORD'
            docker compose -f docker-compose.staging.yml restart web-staging

  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to Production via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -e
            cd /opt/odoo/production
            export GIT_SSH_COMMAND='ssh -i /root/.ssh/id_ed25519 -o StrictHostKeyChecking=no'
            git fetch origin
            git reset --hard origin/main
            docker compose -f docker-compose.production.yml build --no-cache web-production
            docker compose -f docker-compose.production.yml up -d
            echo "Esperando que Odoo produccion este listo..."
            for i in $(seq 1 24); do
              if docker exec odoo-production curl -sf http://localhost:8069/web/health > /dev/null 2>&1; then
                echo "Odoo listo despues de $((i * 5))s"
                break
              fi
              echo "  Intento $i/24..."
              sleep 5
            done
            docker cp corrections/fix_db_module_descriptions.py odoo-production:/tmp/fix_db_desc.py
            docker exec odoo-production bash -c 'python3 /tmp/fix_db_desc.py amunet_prod $USER $PASSWORD $HOST $PORT'
            docker exec odoo-production bash -c 'python3 /tmp/fix_db_desc.py Amunet_testing $USER $PASSWORD $HOST $PORT'
            docker cp corrections/fix_fk_rule_group_118.py odoo-production:/tmp/fix_fk_rule_group_118.py
            docker exec odoo-production bash -c 'python3 /tmp/fix_fk_rule_group_118.py Amunet_testing $USER $PASSWORD $HOST $PORT'
            docker exec odoo-production bash -c 'odoo -c /etc/odoo/odoo.conf --logfile /dev/stdout --workers 0 -d amunet_prod -u all --stop-after-init --no-http --db_host $HOST --db_port $PORT --db_user $USER --db_password $PASSWORD'
            docker compose -f docker-compose.production.yml restart web-production
            docker exec odoo-production bash -c 'odoo -c /etc/odoo/odoo.conf --logfile /dev/stdout --workers 0 -d Amunet_testing -u all --stop-after-init --no-http --db_host $HOST --db_port $PORT --db_user $USER --db_password $PASSWORD' || echo "WARNING: Amunet_testing upgrade failed, but production is live."
            docker cp corrections/add_inventory_hoja_maestra_covinet_lote_0126.py odoo-production:/tmp/add_inv_hmc_0126.py
            docker exec odoo-production bash -c 'python3 /tmp/add_inv_hmc_0126.py Amunet_testing $USER $PASSWORD $HOST $PORT' || echo "WARNING: Inventory correction (Hoja maestra covinet / lote 0126) failed for Amunet_testing."
            docker cp corrections/create_product_hoja_maestra_antidoping_sangre.py odoo-production:/tmp/create_product_antidoping_sangre.py
            docker exec odoo-production bash -c 'python3 /tmp/create_product_antidoping_sangre.py amunet_prod $USER $PASSWORD $HOST $PORT' || echo "WARNING: create_product_antidoping_sangre en amunet_prod fallo."
            docker exec odoo-production bash -c 'python3 /tmp/create_product_antidoping_sangre.py Amunet_testing $USER $PASSWORD $HOST $PORT' || echo "WARNING: create_product_antidoping_sangre en Amunet_testing fallo."
            docker cp corrections/create_product_hoja_maestra_antidoping_sangre_3_parametros.py odoo-production:/tmp/create_product_antidoping_sangre_3p.py
            docker exec odoo-production bash -c 'python3 /tmp/create_product_antidoping_sangre_3p.py amunet_prod $USER $PASSWORD $HOST $PORT' || echo "WARNING: create_product_antidoping_sangre_3p en amunet_prod fallo."
            docker exec odoo-production bash -c 'python3 /tmp/create_product_antidoping_sangre_3p.py Amunet_testing $USER $PASSWORD $HOST $PORT' || echo "WARNING: create_product_antidoping_sangre_3p en Amunet_testing fallo."
            docker cp corrections/create_product_hoja_maestra_antidoping_sangre_3_parametros.py odoo-production:/tmp/create_product_antidoping_sangre_3p.py
            docker exec odoo-production bash -c 'python3 /tmp/create_product_antidoping_sangre_3p.py amunet_prod $USER $PASSWORD $HOST $PORT' || echo "WARNING: create_product_antidoping_sangre_3p en amunet_prod fallo."
            docker exec odoo-production bash -c 'python3 /tmp/create_product_antidoping_sangre_3p.py Amunet_testing $USER $PASSWORD $HOST $PORT' || echo "WARNING: create_product_antidoping_sangre_3p en Amunet_testing fallo."
