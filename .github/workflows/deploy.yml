name: Deploy Odoo

on:
  push:
    branches:
      - main
      - staging

jobs:
  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/staging'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to Staging via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -e
            cd /opt/odoo/staging
            export GIT_SSH_COMMAND='ssh -i /root/.ssh/id_ed25519 -o StrictHostKeyChecking=no'
            git fetch origin
            git checkout staging 2>/dev/null || git checkout -b staging origin/staging
            git reset --hard origin/staging
            docker compose -f docker-compose.staging.yml build --no-cache web-staging
            docker compose -f docker-compose.staging.yml up -d --force-recreate
            echo "Esperando que Odoo staging este listo..."
            for i in $(seq 1 24); do
              if docker exec odoo-staging curl -sf http://localhost:8069/web/health > /dev/null 2>&1; then
                echo "Odoo listo despues de $((i * 5))s"
                break
              fi
              echo "  Intento $i/24..."
              sleep 5
            done
            docker exec odoo-staging bash -c 'odoo -c /etc/odoo/odoo.conf -d amunet_prod -u all --stop-after-init --no-http --db_host $HOST --db_port $PORT --db_user $USER --db_password $PASSWORD'
            docker exec odoo-staging bash -c 'odoo -c /etc/odoo/odoo.conf -d Amunet_testing -u all --stop-after-init --no-http --db_host $HOST --db_port $PORT --db_user $USER --db_password $PASSWORD'
            docker compose -f docker-compose.staging.yml restart web-staging

  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to Production via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -e
            cd /opt/odoo/production
            export GIT_SSH_COMMAND='ssh -i /root/.ssh/id_ed25519 -o StrictHostKeyChecking=no'
            git fetch origin
            git reset --hard origin/main
            docker compose -f docker-compose.production.yml build --no-cache web-production
            docker compose -f docker-compose.production.yml up -d
            echo "Esperando que Odoo produccion este listo..."
            for i in $(seq 1 24); do
              if docker exec odoo-production curl -sf http://localhost:8069/web/health > /dev/null 2>&1; then
                echo "Odoo listo despues de $((i * 5))s"
                break
              fi
              echo "  Intento $i/24..."
              sleep 5
            done
            python3 - <<'PYEOF'
import psycopg2, json, os
DBS = ['amunet_prod', 'Amunet_testing']
CLEAN = {
    'amunet_lot':                   'Generacion automatica de secuencias de lotes para Odoo.',
    'amunet_quality':               'Sistema de Control de Calidad para manufactura de dispositivos medicos y productos farmaceuticos.',
    'amunet_auditorias':            'Gestion del Programa de Auditorias bajo ISO 13485.',
    'amunet_warehouse_access':      'Control de acceso dinamico por almacen y operaciones de inventario.',
    'amunet_competencias':          'Gestion de capacitacion y competencias bajo ISO 13485.',
    'amunet_equipment_calibration': 'Control de calibracion de equipos bajo ISO 13485.',
    'amunet_transfer_bom':          'Transferencia y gestion de listas de materiales.',
}
for db in DBS:
    try:
        conn = psycopg2.connect(dbname=db, user=os.environ['USER'], password=os.environ['PASSWORD'], host=os.environ['HOST'], port=os.environ['PORT'])
        cur = conn.cursor()
        for mod, desc in CLEAN.items():
            cur.execute("SELECT id, description FROM ir_module_module WHERE name = %s", (mod,))
            row = cur.fetchone()
            if row:
                mid, old = row
                try:
                    d = old if isinstance(old, dict) else json.loads(old or '{}')
                    nd = {k: desc for k in d.keys()} if d else {'en_US': desc}
                except Exception:
                    nd = {'en_US': desc}
                cur.execute("UPDATE ir_module_module SET description = %s WHERE id = %s", (json.dumps(nd), mid))
        conn.commit()
        conn.close()
        print(f'Fixed descriptions in {db}')
    except Exception as e:
        print(f'Warning: could not fix {db}: {e}')
PYEOF
            docker exec odoo-production bash -c 'odoo -c /etc/odoo/odoo.conf -d amunet_prod -u all --stop-after-init --no-http --db_host $HOST --db_port $PORT --db_user $USER --db_password $PASSWORD'
            docker exec odoo-production bash -c 'odoo -c /etc/odoo/odoo.conf -d Amunet_testing -u all --stop-after-init --no-http --db_host $HOST --db_port $PORT --db_user $USER --db_password $PASSWORD'
            docker compose -f docker-compose.production.yml restart web-production
