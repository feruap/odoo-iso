name: Deploy Odoo

on:
  push:
    branches:
      - main
      - staging

jobs:
  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/staging'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to Staging via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -e
            cd /opt/odoo/staging
            export GIT_SSH_COMMAND='ssh -i /root/.ssh/id_ed25519 -o StrictHostKeyChecking=no'
            git fetch origin
            git checkout staging 2>/dev/null || git checkout -b staging origin/staging
            git checkout -- .
            git pull origin staging
            docker compose -f docker-compose.staging.yml build web-staging
            docker compose -f docker-compose.staging.yml up -d
            echo "Esperando que Odoo staging este listo..."
            for i in $(seq 1 24); do
              if docker exec odoo-staging curl -sf http://localhost:8069/web/health > /dev/null 2>&1; then
                echo "Odoo listo despues de $((i * 5))s"
                break
              fi
              echo "  Intento $i/24..."
              sleep 5
            done
            docker exec odoo-staging odoo -c /etc/odoo/odoo.conf -d amunet_testing -u all --stop-after-init --db_host db-staging --db_port 5432 --db_user odoo --db_password ${STAGING_DB_PASS:-odoo_staging_2024_secure}
            docker compose -f docker-compose.staging.yml restart web-staging

  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to Production via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -e
            cd /opt/odoo/production
            export GIT_SSH_COMMAND='ssh -i /root/.ssh/id_ed25519 -o StrictHostKeyChecking=no'
            git fetch origin
            git pull origin main
            docker compose -f docker-compose.production.yml build web-production
            docker compose -f docker-compose.production.yml up -d
            sleep 15
            docker exec odoo-production odoo -c /etc/odoo/odoo.conf -d odoo_production -u all --stop-after-init --db_host db-production --db_port 5432 --db_user odoo --db_password ${PROD_DB_PASS:-odoo_prod_2024_secure}
            docker compose -f docker-compose.production.yml restart web-production
